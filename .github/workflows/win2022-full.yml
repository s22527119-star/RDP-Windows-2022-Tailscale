name: Direct RDP Test

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Enable RDP and Set Password
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          netsh advfirewall firewall set rule group="Remote Desktop" new enable=Yes
          net user runneradmin Test12345

      - name: Get Public IP
        shell: pwsh
        run: |
          Write-Output ""
          Write-Output "******************************************"
          Write-Output "  FETCHING YOUR PUBLIC IP..."
          Write-Output "******************************************"
          Write-Output ""
          $ip = Invoke-RestMethod -Uri "https://api.ipify.org"
          Write-Output "  YOUR IP: $ip"
          Write-Output ""
          Write-Output "******************************************"
          Write-Output "  RDP CONNECTION DETAILS:"
          Write-Output "  IP: $ip"
          Write-Output "  Port: 3389"
          Write-Output "  Username: runneradmin"
          Write-Output "  Password: Test12345"
          Write-Output "******************************************"
          Write-Output ""
          Write-Output "Waiting 30 seconds for you to copy..."
          Start-Sleep -Seconds 30

      - name: Keep Alive
        shell: cmd
        run: |
          echo Session is now in keep-alive mode.
          echo You can RDP to the IP above.
          ping -n 7200 127.0.0.1 > nul
