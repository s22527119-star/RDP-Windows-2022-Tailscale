name: Windows 2022 Full with WireGuard

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
      - name: Download Required Files
        run: |
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/start.bat -OutFile start.bat
          Invoke-WebRequest https://github.com/arifkembiri/RDP-Windows-2022-Tailscale/blob/main/wallpaper.png?raw=true -OutFile wallpaper.png
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/wallpaper.bat -OutFile wallpaper.bat
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/loop.bat -OutFile loop.bat

      - name: Install WireGuard
        shell: pwsh
        run: |
          Write-Output "Downloading WireGuard from GitHub mirror..."
          $installerUrl = "https://github.com/WireGuard/wireguard-windows/releases/download/0.5.3/wireguard-amd64-0.5.3.msi"
          $installerPath = "$env:TEMP\wireguard-installer.msi"
          
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -TimeoutSec 120
          
          Write-Output "Installing WireGuard..."
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          
          Start-Sleep -Seconds 15
          
          if (Test-Path "C:\Program Files\WireGuard\wireguard.exe") {
            Write-Output "WireGuard installed successfully!"
          } elseif (Test-Path "${env:ProgramFiles(x86)}\WireGuard\wireguard.exe") {
            Write-Output "WireGuard installed in Program Files (x86)"
          } else {
            Write-Error "WireGuard installation failed!"
            Get-ChildItem "C:\Program Files" | Where-Object { $_.Name -like "*wireguard*" -or $_.Name -like "*WireGuard*" }
            Get-ChildItem "${env:ProgramFiles(x86)}" | Where-Object { $_.Name -like "*wireguard*" -or $_.Name -like "*WireGuard*" }
            exit 1
          }

      - name: Setup and Connect WireGuard Tunnel
        shell: pwsh
        env:
          WIREGUARD_PRIVATE_KEY: ${{ secrets.WIREGUARD_PRIVATE_KEY }}
          WIREGUARD_ADDRESS: ${{ secrets.WIREGUARD_ADDRESS }}
          WIREGUARD_PEER_PUBLIC_KEY: ${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}
          WIREGUARD_ENDPOINT: ${{ secrets.WIREGUARD_ENDPOINT }}
        run: |
          $wgPath = if (Test-Path "C:\Program Files\WireGuard\wireguard.exe") {
            "C:\Program Files\WireGuard"
          } else {
            "${env:ProgramFiles(x86)}\WireGuard"
          }
          
          $configPath = "$env:TEMP\wg0.conf"
          $configContent = "[Interface]`nPrivateKey = $env:WIREGUARD_PRIVATE_KEY`nAddress = $env:WIREGUARD_ADDRESS`nDNS = 1.1.1.1`n`n[Peer]`nPublicKey = $env:WIREGUARD_PEER_PUBLIC_KEY`nEndpoint = $env:WIREGUARD_ENDPOINT`nAllowedIPs = 0.0.0.0/0`nPersistentKeepalive = 25"
          $configContent | Out-File -FilePath $configPath -Encoding ascii
          
          Write-Output "Starting WireGuard tunnel..."
          & "$wgPath\wireguard.exe" /installtunnelservice $configPath
          Start-Sleep -Seconds 5
          Write-Output "WireGuard tunnel connected successfully!"

      - name: Enable RDP Access
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          copy wallpaper.png C:\Users\Public\Desktop\wallpaper.png
          copy wallpaper.bat C:\Users\Public\Desktop\wallpaper.bat

      - name: Show Connection Details
        run: |
          Write-Output "=========================================="
          Write-Output "WireGuard Tunnel Active!"
          Write-Output "Runner WireGuard IP: ${{ secrets.WIREGUARD_ADDRESS }}"
          Write-Output "Connected to Endpoint: ${{ secrets.WIREGUARD_ENDPOINT }}"
          Write-Output "=========================================="

      - name: Start RDP Session and Keep Alive
        run: |
          cmd /c start.bat
          cmd /c loop.bat

      - name: Cleanup WireGuard
        if: always()
        shell: pwsh
        run: |
          $wgPath = if (Test-Path "C:\Program Files\WireGuard\wireguard.exe") {
            "C:\Program Files\WireGuard"
          } else {
            "${env:ProgramFiles(x86)}\WireGuard"
          }
          if (Test-Path "$wgPath\wireguard.exe") {
            & "$wgPath\wireguard.exe" /uninstalltunnelservice wg0
            Write-Output "Cleanup completed."
          } else {
            Write-Output "WireGuard not found, skipping cleanup."
          }
