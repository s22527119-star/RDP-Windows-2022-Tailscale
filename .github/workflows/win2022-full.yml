name: Direct RDP Test

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Enable RDP and Set Password
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          netsh advfirewall firewall set rule group="Remote Desktop" new enable=Yes
          net user runneradmin Test12345

      - name: Get Public IP
        shell: cmd
        run: |
          echo.
          echo ******************************************
          echo   FETCHING YOUR PUBLIC IP...
          echo ******************************************
          echo.
          curl -s https://api.ipify.org
          echo.
          echo.
          echo ******************************************
          echo   RDP CONNECTION DETAILS:
          echo   IP: Look right above this line ^^^
          echo   Port: 3389
          echo   Username: runneradmin
          echo   Password: Test12345
          echo ******************************************
          echo.
          echo Waiting 30 seconds so you can copy the IP...
          timeout /t 30 /nobreak

      - name: Keep Alive
        shell: cmd
        run: |
          echo Session is now in keep-alive mode.
          echo You can RDP to the IP above.
          ping -n 7200 127.0.0.1 > nul
