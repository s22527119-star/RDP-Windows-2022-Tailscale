name: Windows 2022 Full with WireGuard

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
      - name: Download Required Files
        run: |
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/start.bat -OutFile start.bat
          Invoke-WebRequest https://github.com/arifkembiri/RDP-Windows-2022-Tailscale/blob/main/wallpaper.png?raw=true -OutFile wallpaper.png
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/wallpaper.bat -OutFile wallpaper.bat
          Invoke-WebRequest https://raw.githubusercontent.com/arifkembiri/RDP-Windows-2022-Tailscale/refs/heads/main/loop.bat -OutFile loop.bat

      - name: Install WireGuard
        shell: pwsh
        run: |
          Write-Output "Getting latest WireGuard download URL..."
          $apiUrl = "https://api.github.com/repos/WireGuard/wireguard-windows/releases/latest"
          $release = Invoke-RestMethod -Uri $apiUrl
          $asset = $release.assets | Where-Object { $_.name -like "*amd64*.msi" -or $_.name -like "*x86_64*.msi" } | Select-Object -First 1
          
          if (-not $asset) {
            Write-Error "Could not find WireGuard MSI installer"
            exit 1
          }
          
          $installerUrl = $asset.browser_download_url
          Write-Output "Downloading WireGuard from: $installerUrl"
          
          $installerPath = "$env:TEMP\wireguard-installer.msi"
          
          # دانلود با قابلیت ردگیری پیشرفت
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -TimeoutSec 180
          $ProgressPreference = 'Continue'
          
          Write-Output "Installing WireGuard..."
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart DO_NOT_LAUNCH=1" -Wait
          
          Start-Sleep -Seconds 10
          
          # بررسی مسیرهای مختلف نصب
          $possiblePaths = @(
            "C:\Program Files\WireGuard\wireguard.exe",
            "${env:ProgramFiles(x86)}\WireGuard\wireguard.exe",
            "C:\Program Files\WireGuard\wg.exe",
            "${env:ProgramFiles(x86)}\WireGuard\wg.exe"
          )
          
          $found = $false
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              Write-Output "WireGuard found at: $path"
              $found = $true
              break
            }
          }
          
          if (-not $found) {
            Write-Error "WireGuard installation failed!"
            Write-Output "Searching for WireGuard files..."
            Get-ChildItem "C:\Program Files" -Recurse -Filter "wireguard*" -ErrorAction SilentlyContinue
            Get-ChildItem "${env:ProgramFiles(x86)}" -Recurse -Filter "wireguard*" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Setup and Connect WireGuard Tunnel
        shell: pwsh
        env:
          WIREGUARD_PRIVATE_KEY: ${{ secrets.WIREGUARD_PRIVATE_KEY }}
          WIREGUARD_ADDRESS: ${{ secrets.WIREGUARD_ADDRESS }}
          WIREGUARD_PEER_PUBLIC_KEY: ${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}
          WIREGUARD_ENDPOINT: ${{ secrets.WIREGUARD_ENDPOINT }}
        run: |
          # پیدا کردن مسیر wireguard.exe
          $wgExe = Get-ChildItem "C:\Program Files" -Recurse -Filter "wireguard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $wgExe) {
            $wgExe = Get-ChildItem "${env:ProgramFiles(x86)}" -Recurse -Filter "wireguard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          
          if (-not $wgExe) {
            Write-Error "wireguard.exe not found!"
            exit 1
          }
          
          $wgPath = $wgExe.FullName
          Write-Output "Using WireGuard at: $wgPath"
          
          $configPath = "$env:TEMP\wg0.conf"
          $configContent = "[Interface]`nPrivateKey = $env:WIREGUARD_PRIVATE_KEY`nAddress = $env:WIREGUARD_ADDRESS`nDNS = 1.1.1.1`n`n[Peer]`nPublicKey = $env:WIREGUARD_PEER_PUBLIC_KEY`nEndpoint = $env:WIREGUARD_ENDPOINT`nAllowedIPs = 0.0.0.0/0`nPersistentKeepalive = 25"
          $configContent | Out-File -FilePath $configPath -Encoding ascii
          
          Write-Output "Starting WireGuard tunnel..."
          & $wgPath /installtunnelservice $configPath
          Start-Sleep -Seconds 5
          Write-Output "WireGuard tunnel connected successfully!"

      - name: Enable RDP Access
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          copy wallpaper.png C:\Users\Public\Desktop\wallpaper.png
          copy wallpaper.bat C:\Users\Public\Desktop\wallpaper.bat

      - name: Show Connection Details
        run: |
          Write-Output "=========================================="
          Write-Output "WireGuard Tunnel Active!"
          Write-Output "Runner WireGuard IP: ${{ secrets.WIREGUARD_ADDRESS }}"
          Write-Output "Connected to Endpoint: ${{ secrets.WIREGUARD_ENDPOINT }}"
          Write-Output "=========================================="

      - name: Start RDP Session and Keep Alive
        run: |
          cmd /c start.bat
          cmd /c loop.bat

      - name: Cleanup WireGuard
        if: always()
        shell: pwsh
        run: |
          $wgExe = Get-ChildItem "C:\Program Files" -Recurse -Filter "wireguard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $wgExe) {
            $wgExe = Get-ChildItem "${env:ProgramFiles(x86)}" -Recurse -Filter "wireguard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          
          if ($wgExe) {
            & $wgExe.FullName /uninstalltunnelservice wg0
            Write-Output "WireGuard tunnel removed."
          } else {
            Write-Output "WireGuard not found, skipping cleanup."
          }
