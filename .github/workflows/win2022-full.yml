name: WireGuard RDP Session

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
      - name: Install WireGuard
        shell: cmd
        run: |
          choco install wireguard -y --no-progress
          echo WireGuard Installed.

      - name: Connect to Your WireGuard
        shell: cmd
        env:
          WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        run: |
          echo %WIREGUARD_CONFIG% > "%TEMP%\wg0.conf"
          "C:\Program Files\WireGuard\wireguard.exe" /installtunnelservice "%TEMP%\wg0.conf"
          echo Tunnel Status:
          "C:\Program Files\WireGuard\wireguard.exe" /show

      - name: Enable RDP and Set Password
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          # اینجا یه پسورد ساده ست می‌کنیم
          net user runneradmin MyRDP@Pass123
          Write-Output "RDP is Active. Use WireGuard IP to Connect."

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Output "RDP Connection Info:"
          Write-Output "Username: runneradmin"
          Write-Output "Password: MyRDP@Pass123"
          Write-Output "Connect through your WireGuard network to this runner's IP"
          while ($true) { Start-Sleep -Seconds 60 }
